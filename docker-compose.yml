services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-focus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-focus365}
    ports:
      - "${DB_HOST_PORT:-5544}:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-focus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://focus:changeme@db:5432/focus365?sslmode=disable}
      API_PORT: ${API_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_VISION_MODEL: ${GROQ_VISION_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
    ports:
      - "${API_HOST_PORT:-8088}:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "${WEB_HOST_PORT:-5174}:80"
    depends_on:
      - api

volumes:
  dbdata:
